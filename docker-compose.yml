# docker-compose.yml — Shadowbox local development stack
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f web    # Follow web logs
#   docker compose down           # Stop all services
#
# Access:
#   Web UI:  http://localhost:7799

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7799:7799"
    env_file: .env
    environment:
      - HOOK_DIR=/app
      - DATABASE_URL=postgresql://shadowbox:shadowbox@db:5432/shadowbox
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - feed-data:/app/data/feeds
      - cache-data:/app/data/cache
      - faiss-data:/app/data/faiss
      - investigation-data:/app/data/investigations
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shadowbox
      POSTGRES_USER: shadowbox
      POSTGRES_PASSWORD: shadowbox
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadowbox"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  pg-data:
  feed-data:
  cache-data:
  faiss-data:
  investigation-data:
  ollama-models:
