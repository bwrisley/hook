name: Build and Deploy Shadowbox

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository }}/shadowbox-web
  GATEWAY_IMAGE: ghcr.io/${{ github.repository }}/shadowbox-gateway

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/test_mocks.py tests/test_rag.py -v

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set environment tag
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.env.outputs.tag }}
            ${{ env.WEB_IMAGE }}:${{ github.sha }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.gateway
          push: true
          tags: |
            ${{ env.GATEWAY_IMAGE }}:${{ steps.env.outputs.tag }}
            ${{ env.GATEWAY_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'dev'
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "rg=shadowbox-prod" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "hostname=shadowbox.punchcyber.com" >> $GITHUB_OUTPUT
          else
            echo "rg=shadowbox-dev" >> $GITHUB_OUTPUT
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "hostname=dev-shadowbox.punchcyber.com" >> $GITHUB_OUTPUT
          fi

      - name: Deploy web container
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ steps.env.outputs.rg }}
          containerAppName: shadowbox-web
          imageToDeploy: ${{ env.WEB_IMAGE }}:${{ steps.env.outputs.tag }}

      - name: Deploy gateway container
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ steps.env.outputs.rg }}
          containerAppName: shadowbox-gateway
          imageToDeploy: ${{ env.GATEWAY_IMAGE }}:${{ steps.env.outputs.tag }}
