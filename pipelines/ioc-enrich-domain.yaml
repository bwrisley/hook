# Single domain enrichment — VT + DNS + WHOIS
# Usage: lobster run --name ioc-enrich-domain --args-json '{"domain":"evil-update.com"}'
name: ioc-enrich-domain
args:
  domain:
    required: true
env:
  VT_API_KEY: "${VT_API_KEY}"
steps:
  - id: enrich
    command: bash scripts/enrich-domain.sh "${domain}"
  - id: format
    command: "python3 -c \"import json,sys; d=json.load(sys.stdin); r=d.get('risk','?'); ioc=d.get('ioc','?'); icon={'HIGH':'🔴','MEDIUM':'🟡','LOW':'🟢'}.get(r,'⚪'); print(json.dumps({'summary': f'{icon} {ioc} — {r} risk', 'details': d}, indent=2))\""
    stdin: $enrich.stdout
